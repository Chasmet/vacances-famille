<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#101827">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>Vacances Famille</title>
<style>
:root{--bg:#0b1220;--card:#111c2f;--soft:#17233a;--txt:#f8fafc;--muted:#aab5c8;--line:rgba(255,255,255,.12);--a:#5eead4;--b:#38bdf8;--red:#fb7185;--yellow:#facc15}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#08111f,#101827,#11253a);color:var(--txt);font-family:system-ui,Arial,sans-serif;min-height:100vh;padding-bottom:86px}header{position:sticky;top:0;z-index:5;background:rgba(11,18,32,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:15px}.top{max-width:950px;margin:auto;display:flex;gap:12px;align-items:center}.logo{width:52px;height:52px;border-radius:17px;background:linear-gradient(135deg,var(--a),var(--b));display:grid;place-items:center;color:#07111f;font-weight:900;font-size:24px}h1{font-size:20px;margin:0}.sub,.mini{color:var(--muted);font-size:13px}.wrap{max-width:950px;margin:auto;padding:12px}.card{background:rgba(17,28,47,.95);border:1px solid var(--line);border-radius:22px;padding:15px;margin-bottom:12px;box-shadow:0 16px 38px rgba(0,0,0,.25)}.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.metric{font-size:30px;font-weight:900}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.between{display:flex;justify-content:space-between;gap:10px;align-items:center}label{display:block;color:var(--muted);font-size:13px;margin:10px 0 6px}input,select,textarea,button{font:inherit}input,select,textarea{width:100%;border:1px solid var(--line);background:#0d1728;color:var(--txt);border-radius:15px;padding:13px;outline:none}textarea{min-height:76px}.two,.three,.four{display:grid;grid-template-columns:1fr 1fr;gap:10px}.three{grid-template-columns:1fr 1fr 1fr}.four{grid-template-columns:repeat(4,1fr)}.btn{border:0;border-radius:15px;padding:13px 14px;font-weight:850;background:linear-gradient(135deg,var(--a),var(--b));color:#07111f;width:100%}.btn2{background:#22314d;color:var(--txt);border:1px solid var(--line)}.danger{background:rgba(251,113,133,.15);color:#fecdd3;border:1px solid rgba(251,113,133,.35)}.small{width:auto;padding:9px 11px;border-radius:12px;font-size:13px}.tabs{position:fixed;bottom:0;left:0;right:0;background:rgba(8,17,31,.97);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(6,1fr);gap:5px;padding:8px}.tab{background:transparent;border:1px solid transparent;color:var(--muted);border-radius:15px;padding:9px 3px;font-size:10px;font-weight:850}.tab.active{background:linear-gradient(135deg,var(--a),var(--b));color:#07111f}.screen{display:none}.screen.active{display:block}.list{display:grid;gap:10px;margin-top:10px}.item{background:rgba(23,35,58,.88);border:1px solid var(--line);border-radius:18px;padding:13px}.item h3{margin:0 0 6px;font-size:16px}.item p{margin:4px 0;color:var(--muted);font-size:13px}.tag{font-size:12px;border-radius:999px;padding:5px 8px;background:rgba(94,234,212,.12);color:#a7fff0;border:1px solid rgba(94,234,212,.25)}.empty{text-align:center;color:var(--muted);padding:16px;border:1px dashed var(--line);border-radius:18px}.warn{border-color:rgba(250,204,21,.5);background:rgba(250,204,21,.08)}.red{color:#fda4af}.yellow{color:#fde68a}.calHead{display:grid;grid-template-columns:42px 1fr 42px;align-items:center;gap:8px}.calTitle{text-align:center;font-weight:900}.calGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:12px}.dn{text-align:center;color:var(--muted);font-size:12px;font-weight:850;padding:7px 0}.day{min-height:52px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid var(--line);padding:7px;font-size:12px;position:relative;overflow:hidden}.off{opacity:.45}.vac{background:linear-gradient(135deg,rgba(94,234,212,.23),rgba(56,189,248,.18));border-color:rgba(94,234,212,.4)}.holiday{box-shadow:inset 0 0 0 1px rgba(250,204,21,.5)}.dot{position:absolute;right:7px;bottom:7px;width:8px;height:8px;border-radius:50%;background:var(--a)}.install{display:none}.install.show{display:block}@media(max-width:700px){.two,.three,.four{grid-template-columns:1fr 1fr}.metric{font-size:26px}.day{min-height:48px}.wrap{padding:10px}}
</style>
</head>
<body>
<header><div class="top"><div class="logo">VF</div><div><h1>Vacances Famille</h1><div class="sub">Congés - RTT - CET - Autre</div></div></div></header>
<main class="wrap">
<section id="home" class="screen active">
<div id="installBox" class="card install"><div class="between"><div><b>Installer sur Android</b><p class="mini">Ajoute l’application sur ton écran d’accueil.</p></div><button id="installBtn" class="btn small">Installer</button></div></div>
<div id="homeCards" class="cards"></div>
<div class="card"><div class="between"><h2 style="margin:0;font-size:19px">Résumé</h2><span id="yearBadge" class="tag"></span></div><div id="alerts" class="list"></div></div>
<div class="card"><h2 style="margin-top:0;font-size:19px">Sauvegarde</h2><div class="two"><button class="btn btn2" onclick="exportData()">Exporter</button><button class="btn btn2" onclick="importFile.click()">Importer</button></div><input id="importFile" type="file" accept="application/json" style="display:none"><p class="mini">Les données restent dans ton téléphone. Exporte pour garder une copie.</p></div>
</section>
<section id="moi" class="screen"></section>
<section id="femme" class="screen"></section>
<section id="calMoi" class="screen"></section>
<section id="calFemme" class="screen"></section>
<section id="settings" class="screen"><div class="card"><h2 style="margin-top:0">Réglages</h2><div class="two"><div><label>Nom profil moi</label><input id="nameMoi"></div><div><label>Nom profil femme</label><input id="nameFemme"></div></div><label>Année</label><input id="year" type="number" min="2024" max="2100"><h3>Mes droits</h3><div class="four"><div><label>Congés</label><input id="moiConges" type="number" min="0" step="0.5"></div><div><label>RTT</label><input id="moiRtt" type="number" min="0" step="0.5"></div><div><label>CET</label><input id="moiCet" type="number" min="0" step="0.5"></div><div><label>Autre</label><input id="moiAutre" type="number" min="0" step="0.5"></div></div><h3>Droits de ma femme</h3><div class="four"><div><label>Congés</label><input id="femmeConges" type="number" min="0" step="0.5"></div><div><label>RTT</label><input id="femmeRtt" type="number" min="0" step="0.5"></div><div><label>CET</label><input id="femmeCet" type="number" min="0" step="0.5"></div><div><label>Autre</label><input id="femmeAutre" type="number" min="0" step="0.5"></div></div><label><input id="excludeHolidays" type="checkbox" style="width:auto;margin-right:8px"> Ne pas compter les jours fériés français</label><label>Notes personnelles</label><textarea id="notes" placeholder="Exemple : vacances scolaires, ponts, garde enfants..."></textarea><button class="btn" onclick="saveSettings()">Enregistrer</button></div><div class="card"><h2 style="margin-top:0">Remise à zéro</h2><button class="btn danger" onclick="resetAll()">Effacer toutes les données</button></div></section>
</main>
<nav class="tabs"><button class="tab active" data-go="home">Accueil</button><button class="tab" data-go="moi">Moi</button><button class="tab" data-go="femme">Femme</button><button class="tab" data-go="calMoi">Cal moi</button><button class="tab" data-go="calFemme">Cal femme</button><button class="tab" data-go="settings">Réglages</button></nav>
<script>
const KEY='vacancesFamilleV2';
const TYPES=['Congés annuels','RTT','Compte épargne temps','Autre'];
const base={settings:{nameMoi:'Moi',nameFemme:'Ma femme',year:new Date().getFullYear(),excludeHolidays:true,notes:'',quotas:{moi:{'Congés annuels':25,'RTT':0,'Compte épargne temps':0,'Autre':0},femme:{'Congés annuels':25,'RTT':0,'Compte épargne temps':0,'Autre':0}}},vacations:[]};
let data=load(),month=new Date().getMonth(),deferredInstall=null;
function migrate(x){if(!x.settings.quotas){x.settings.quotas={moi:{'Congés annuels':x.settings.quotaMoi||25,'RTT':0,'Compte épargne temps':0,'Autre':0},femme:{'Congés annuels':x.settings.quotaFemme||25,'RTT':0,'Compte épargne temps':0,'Autre':0}}}x.vacations.forEach(v=>{if(['Vac 1','Vac 2','Vac 3'].includes(v.type))v.type='Congés annuels';if(v.type==='CET')v.type='Compte épargne temps'});return x}
function load(){try{return migrate(JSON.parse(localStorage.getItem(KEY))||JSON.parse(localStorage.getItem('vacancesFamilleV1'))||structuredClone(base))}catch(e){return structuredClone(base)}}
function save(){localStorage.setItem(KEY,JSON.stringify(data));render()}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function parse(s){let a=s.split('-').map(Number);return new Date(a[0],a[1]-1,a[2])}
function iso(d){return d.toISOString().slice(0,10)}
function each(a,b,cb){let d=parse(a),e=parse(b);while(d<=e){cb(new Date(d));d.setDate(d.getDate()+1)}}
function weekEnd(d){return d.getDay()==0||d.getDay()==6}
function add(d,n){let x=new Date(d);x.setDate(x.getDate()+n);return x}
function easter(y){let a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),da=(h+l-7*m+114)%31+1;return new Date(y,mo-1,da)}
function holidays(y){let e=easter(y);return new Set([`${y}-01-01`,`${y}-05-01`,`${y}-05-08`,`${y}-07-14`,`${y}-08-15`,`${y}-11-01`,`${y}-11-11`,`${y}-12-25`,iso(add(e,1)),iso(add(e,39)),iso(add(e,50))])}
function count(a,b){if(!a||!b||parse(b)<parse(a))return 0;let n=0,h=holidays(data.settings.year);each(a,b,d=>{let s=iso(d);if(!weekEnd(d)&&!(data.settings.excludeHolidays&&h.has(s)))n++});return n}
function label(p){return p==='moi'?data.settings.nameMoi:data.settings.nameFemme}
function vacs(p){return data.vacations.filter(v=>v.person===p).sort((a,b)=>a.start.localeCompare(b.start))}
function days(v){return count(v.start,v.end)}
function used(p,t){return vacs(p).filter(v=>v.type===t).reduce((s,v)=>s+days(v),0)}
function totalUsed(p){return TYPES.reduce((s,t)=>s+used(p,t),0)}
function quota(p,t){return Number(data.settings.quotas[p][t]||0)}
function overlap(a,b){return a.start<=b.end&&b.start<=a.end}
function conflicts(v){return data.vacations.filter(x=>x.id!==v.id&&x.person!==v.person&&overlap(v,x))}
function fmt(s){return parse(s).toLocaleDateString('fr-FR')}
function clean(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function go(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.go===id));render()}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>go(t.dataset.go));
function render(){renderHome();renderPerson('moi');renderPerson('femme');renderCal('calMoi','moi');renderCal('calFemme','femme');renderSettings()}
function renderHome(){yearBadge.textContent='Année '+data.settings.year;homeCards.innerHTML=['moi','femme'].map(p=>`<div class="card"><h3 style="margin-top:0">${label(p)}</h3><div class="metric">${totalUsed(p)}</div><div class="mini">jours posés au total</div>${TYPES.map(t=>`<p class="mini"><b>${t}</b> : ${used(p,t)} pris - ${quota(p,t)-used(p,t)} restant</p>`).join('')}</div>`).join('');let html='';data.vacations.forEach(v=>{if(conflicts(v).length)html+=`<div class="item warn"><h3 class="yellow">Chevauchement détecté</h3><p>${label(v.person)} : ${fmt(v.start)} au ${fmt(v.end)}</p></div>`});['moi','femme'].forEach(p=>TYPES.forEach(t=>{let r=quota(p,t)-used(p,t);if(r<0)html+=`<div class="item"><h3 class="red">${t} dépassé</h3><p>${label(p)} dépasse de ${Math.abs(r)} jour(s).</p></div>`}));alerts.innerHTML=html||'<div class="empty">Aucune alerte. Tout est propre.</div>'}
function renderPerson(p){let list=vacs(p);document.getElementById(p).innerHTML=`<div class="card"><div class="between"><div><h2 style="margin:0">${label(p)}</h2><p class="mini">${totalUsed(p)} jour(s) posé(s) au total</p></div><span class="tag">4 comptes</span></div><div class="four">${TYPES.map(t=>`<div><div class="metric">${quota(p,t)-used(p,t)}</div><div class="mini">${t} restants</div></div>`).join('')}</div></div><div class="card"><h2 style="margin-top:0;font-size:19px">Ajouter une période</h2><div class="two"><div><label>Début</label><input id="${p}Start" type="date"></div><div><label>Fin</label><input id="${p}End" type="date"></div></div><div class="two"><div><label>Compte utilisé</label><select id="${p}Type">${TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div><div><label>Statut</label><select id="${p}Status"><option>Prévu</option><option>Validé</option><option>Refusé</option></select></div></div><label>Note</label><input id="${p}Note" placeholder="Exemple : été, RTT, CET, pont..."><button class="btn" onclick="addVacation('${p}')">Ajouter et recalculer</button><p class="mini">Deux semaines complètes comptent 10 jours, car les week-ends ne comptent pas.</p></div><div class="card"><h2 style="margin-top:0;font-size:19px">Périodes</h2><div class="list">${list.map(itemHtml).join('')||'<div class="empty">Aucune période pour le moment.</div>'}</div></div>`}
function itemHtml(v){let c=conflicts(v).length;return `<div class="item ${c?'warn':''}"><div class="between"><h3>${v.type} - ${days(v)} jour(s)</h3><span class="tag">${v.status}</span></div><p>${fmt(v.start)} au ${fmt(v.end)}</p>${v.note?`<p>${clean(v.note)}</p>`:''}${c?'<p class="yellow">Chevauchement avec l’autre profil.</p>':''}<div class="row"><button class="btn btn2 small" onclick="copyVacation('${v.id}')">Copier</button><button class="btn danger small" onclick="deleteVacation('${v.id}')">Supprimer</button></div></div>`}
function addVacation(p){let a=document.getElementById(p+'Start').value,b=document.getElementById(p+'End').value;if(!a||!b)return alert('Choisis une date de début et une date de fin.');if(parse(b)<parse(a))return alert('La date de fin doit être après la date de début.');data.vacations.push({id:uid(),person:p,start:a,end:b,type:document.getElementById(p+'Type').value,status:document.getElementById(p+'Status').value,note:document.getElementById(p+'Note').value.trim()});save()}
function deleteVacation(id){if(confirm('Supprimer cette période ?')){data.vacations=data.vacations.filter(v=>v.id!==id);save()}}
function copyVacation(id){let v=data.vacations.find(x=>x.id===id);if(v){data.vacations.push({...v,id:uid(),status:'Prévu',note:(v.note||'')+' copie'});save()}}
function monthName(m){return ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'][m]}
function renderCal(id,p){let y=data.settings.year,m=month,first=new Date(y,m,1),last=new Date(y,m+1,0),offset=(first.getDay()+6)%7,names=['L','M','M','J','V','S','D'],h=holidays(y),html='';names.forEach(n=>html+=`<div class="dn">${n}</div>`);for(let i=0;i<offset;i++)html+='<div></div>';for(let d=1;d<=last.getDate();d++){let date=new Date(y,m,d),s=iso(date),v=vacs(p).find(x=>x.start<=s&&s<=x.end),fer=h.has(s);html+=`<div class="day ${weekEnd(date)?'off':''} ${v?'vac':''} ${fer?'holiday':''}"><b>${d}</b>${v?`<div class="mini">${v.type}</div><span class="dot"></span>`:''}${fer?'<div class="mini">Férié</div>':''}</div>`}document.getElementById(id).innerHTML=`<div class="card"><div class="calHead"><button class="btn btn2 small" onclick="moveMonth(-1)">‹</button><div class="calTitle">${label(p)} - ${monthName(m)} ${y}</div><button class="btn btn2 small" onclick="moveMonth(1)">›</button></div><div class="calGrid">${html}</div><p class="mini">Week-ends grisés. Jours fériés marqués.</p></div>`}
function moveMonth(n){month+=n;if(month<0)month=11;if(month>11)month=0;render()}
function renderSettings(){nameMoi.value=data.settings.nameMoi;nameFemme.value=data.settings.nameFemme;year.value=data.settings.year;excludeHolidays.checked=data.settings.excludeHolidays;notes.value=data.settings.notes||'';moiConges.value=quota('moi','Congés annuels');moiRtt.value=quota('moi','RTT');moiCet.value=quota('moi','Compte épargne temps');moiAutre.value=quota('moi','Autre');femmeConges.value=quota('femme','Congés annuels');femmeRtt.value=quota('femme','RTT');femmeCet.value=quota('femme','Compte épargne temps');femmeAutre.value=quota('femme','Autre')}
function saveSettings(){data.settings.nameMoi=nameMoi.value||'Moi';data.settings.nameFemme=nameFemme.value||'Ma femme';data.settings.year=Number(year.value)||new Date().getFullYear();data.settings.excludeHolidays=excludeHolidays.checked;data.settings.notes=notes.value||'';data.settings.quotas={moi:{'Congés annuels':Number(moiConges.value)||0,'RTT':Number(moiRtt.value)||0,'Compte épargne temps':Number(moiCet.value)||0,'Autre':Number(moiAutre.value)||0},femme:{'Congés annuels':Number(femmeConges.value)||0,'RTT':Number(femmeRtt.value)||0,'Compte épargne temps':Number(femmeCet.value)||0,'Autre':Number(femmeAutre.value)||0}};save();alert('Réglages enregistrés.')}
function exportData(){let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sauvegarde-vacances-famille.json';a.click();URL.revokeObjectURL(a.href)}
importFile.onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{data=migrate(JSON.parse(r.result));save();alert('Import terminé.')}catch(err){alert('Fichier invalide.')}};r.readAsText(f)};
function resetAll(){if(confirm('Tout effacer ?')){localStorage.removeItem(KEY);data=structuredClone(base);save()}}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredInstall=e;installBox.classList.add('show')});
installBtn.onclick=async()=>{if(deferredInstall){deferredInstall.prompt();await deferredInstall.userChoice;installBox.classList.remove('show');deferredInstall=null}else alert('Sur Chrome Android : menu ⋮ puis Ajouter à l’écran d’accueil.')};
if('serviceWorker'in navigator){navigator.serviceWorker.register('service-worker.js').catch(()=>{})}
render();
</script>
</body>
</html>
